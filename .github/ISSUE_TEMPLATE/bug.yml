name: Bug
description: Signaler un comportement incorrect
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que se passe-t-il ?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Étapes de reproduction
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Fiscal, sécurité, UX, import, export, autre.
    validations:
      required: false
