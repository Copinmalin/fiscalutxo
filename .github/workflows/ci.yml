name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: TypeScript checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check project files
        id: project
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "has_package=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found on this ref yet. Skipping TypeScript checks."
          fi

      - name: Setup Node.js
        if: steps.project.outputs.has_package == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        if: steps.project.outputs.has_package == 'true'
        run: npm install

      - name: Lint
        if: steps.project.outputs.has_package == 'true'
        run: npm run lint

      - name: Test
        if: steps.project.outputs.has_package == 'true'
        run: npm run test

      - name: Build
        if: steps.project.outputs.has_package == 'true'
        run: npm run build
